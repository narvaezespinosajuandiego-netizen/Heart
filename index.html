<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
const W = canvas.width;
const H = canvas.height;

const scale = Math.min(W, H) / 48;
const cx = W / 2;
const cy = H / 2 + scale;

// Solo contorno del corazón, un único radio
function getHeartPoints(n) {
  const pts = [];
  for (let i = 0; i < n; i++) {
    const t = (i / n) * 2 * Math.PI;
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
    pts.push({ x: cx + x * scale, y: cy + y * scale });
  }
  return pts;
}

const pts = getHeartPoints(100);
const TOTAL = pts.length;
const WAVE_WIDTH = 40;
const WAVE_SPEED = 20;

const texts = ['I love you','I love you','I love you','te amo','I love you'];
const pinks  = ['#ff2d55','#ff6b8a','#ffb3c6','#ff4d6d','#ffffff'];

const pointData = pts.map((p, i) => ({
  x: p.x,
  y: p.y,
  text:  texts[i % texts.length],
  color: pinks[i % pinks.length],
  size:  8 + Math.random() * 5,
}));

// Nicolls flotando por la pantalla
const NICOLL_COUNT = 10;
const nicolls = Array.from({ length: NICOLL_COUNT }, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  vx: (Math.random() - 0.5) * 0.6,
  vy: (Math.random() - 0.5) * 0.6,
  alpha: Math.random(),
  alphaDir: Math.random() > 0.5 ? 1 : -1,
  alphaSpeed: 0.003 + Math.random() * 0.005,
  size: 13 + Math.random() * 18,
  color: pinks[Math.floor(Math.random() * pinks.length)],
}));

let waveHead = 0;
let last = performance.now();

function loop(now) {
  const dt = (now - last) / 1000;
  last = now;

  ctx.clearRect(0, 0, W, H);

  // Ola del corazón
  waveHead = (waveHead + WAVE_SPEED * dt) % TOTAL;

  for (let i = 0; i < TOTAL; i++) {
    const pd = pointData[i];
    let dist = waveHead - i;
    if (dist < 0) dist += TOTAL;
    if (dist > WAVE_WIDTH) continue;

    const t = dist / WAVE_WIDTH;
    const alpha = Math.sin(t * Math.PI);

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = `italic ${pd.size}px Georgia, serif`;
    ctx.fillStyle = pd.color;
    ctx.shadowColor = pd.color;
    ctx.shadowBlur = 10 * alpha;
    ctx.fillText(pd.text, pd.x - 20, pd.y);
    ctx.restore();
  }

  // Nicolls flotando
  for (const n of nicolls) {
    n.x += n.vx;
    n.y += n.vy;

    // Rebotar en bordes
    if (n.x < 0 || n.x > W) n.vx *= -1;
    if (n.y < 0 || n.y > H) n.vy *= -1;

    // Pulsar alpha
    n.alpha += n.alphaDir * n.alphaSpeed;
    if (n.alpha >= 0.85) { n.alpha = 0.85; n.alphaDir = -1; }
    if (n.alpha <= 0.08) { n.alpha = 0.08; n.alphaDir = 1; }

    ctx.save();
    ctx.globalAlpha = n.alpha;
    ctx.font = `italic ${n.size}px Georgia, serif`;
    ctx.fillStyle = n.color;
    ctx.shadowColor = n.color;
    ctx.shadowBlur = 8;
    ctx.fillText('Nicoll', n.x, n.y);
    ctx.restore();
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
