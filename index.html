<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: Georgia, serif;
  }

  canvas {
    display: block;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = canvas.width  = window.innerWidth;
const H = canvas.height = window.innerHeight;

// Ecuación del corazón: x = 16sin³(t), y = 13cos(t)-5cos(2t)-2cos(3t)-cos(4t)
function heartPoint(t, scale, cx, cy) {
  const x = 16 * Math.pow(Math.sin(t), 3);
  const y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
  return { x: cx + x * scale, y: cy + y * scale };
}

// Generar puntos del contorno + interior
function generateHeartPoints(n, scale, cx, cy) {
  const pts = [];
  // Contorno
  for (let i = 0; i < n; i++) {
    const t = (i / n) * 2 * Math.PI;
    pts.push({ ...heartPoint(t, scale, cx, cy), border: true });
  }
  // Interior: muestreo por rechazo
  const xs = [], ys = [];
  for (let t = 0; t < 2*Math.PI; t += 0.01) {
    const p = heartPoint(t, scale, cx, cy);
    xs.push(p.x); ys.push(p.y);
  }
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);

  let filled = 0;
  let attempts = 0;
  while (filled < n * 0.8 && attempts < 50000) {
    attempts++;
    const rx = minX + Math.random() * (maxX - minX);
    const ry = minY + Math.random() * (maxY - minY);
    if (isInsideHeart(rx, ry, scale, cx, cy)) {
      pts.push({ x: rx, y: ry, border: false });
      filled++;
    }
  }
  return pts;
}

function isInsideHeart(px, py, scale, cx, cy) {
  // Normalizar al espacio de la ecuación
  const nx = (px - cx) / scale;
  const ny = -(py - cy) / scale;
  // Condición: (x²+y²-1)³ - x²y³ ≤ 0
  const val = Math.pow(nx*nx + ny*ny - 1, 3) - nx*nx * Math.pow(ny, 3);
  return val <= 0;
}

// Partículas
class Particle {
  constructor(x, y) {
    this.ox = x; // posición original
    this.oy = y;
    this.x = x;
    this.y = y;
    this.vy = -(0.3 + Math.random() * 0.7); // velocidad de subida
    this.alpha = 0;
    this.maxAlpha = 0.5 + Math.random() * 0.5;
    this.size = 7 + Math.random() * 6;
    this.phase = Math.random() * Math.PI * 2; // para que no empiecen todas igual
    this.delay = Math.random() * 3; // segundos de delay
    this.time = -this.delay;
    this.duration = 3 + Math.random() * 2;
    const texts = ['I love you', 'I love you', 'I love you', 'te amo'];
    this.text = texts[Math.floor(Math.random() * texts.length)];
    const pinks = ['#ff2d55','#ff6b8a','#ffb3c6','#ff4d6d','#ffffff'];
    this.color = pinks[Math.floor(Math.random() * pinks.length)];
  }

  update(dt) {
    this.time += dt;
    if (this.time < 0) return; // esperando delay

    const progress = (this.time % this.duration) / this.duration;

    // Fade in/out
    if (progress < 0.2) {
      this.alpha = (progress / 0.2) * this.maxAlpha;
    } else if (progress > 0.7) {
      this.alpha = ((1 - progress) / 0.3) * this.maxAlpha;
    } else {
      this.alpha = this.maxAlpha;
    }

    // Movimiento: sube lentamente y vuelve
    this.y = this.oy - Math.sin(progress * Math.PI) * 18;
    this.x = this.ox + Math.sin(progress * Math.PI * 2 + this.phase) * 3;
  }

  draw(ctx) {
    if (this.alpha <= 0) return;
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.font = `italic ${this.size}px Georgia, serif`;
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 10;
    ctx.fillText(this.text, this.x, this.y);
    ctx.restore();
  }
}

const scale = Math.min(W, H) / 55;
const cx = W / 2;
const cy = H / 2 + scale * 1.5;

const points = generateHeartPoints(120, scale, cx, cy);
const particles = points.map(p => new Particle(p.x, p.y));

let last = performance.now();

function loop(now) {
  const dt = (now - last) / 1000;
  last = now;

  ctx.clearRect(0, 0, W, H);

  particles.forEach(p => {
    p.update(dt);
    p.draw(ctx);
  });

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
