<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: Georgia, serif;
  }
  canvas { position: fixed; top: 0; left: 0; }
  #btn {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: transparent;
    border: none;
    outline: none;
    color: #ffffff;
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 20px;
    cursor: pointer;
    z-index: 10;
    text-shadow: 0 0 12px #ff2d55, 0 0 24px #ff2d55, 0 0 40px #ff6b8a;
    animation: pulse 2s ease-in-out infinite;
    padding: 0;
  }
  @keyframes pulse {
    0%, 100% { text-shadow: 0 0 10px #ff2d55, 0 0 22px #ff2d55, 0 0 38px #ff6b8a; }
    50%       { text-shadow: 0 0 18px #ff2d55, 0 0 36px #ff2d55, 0 0 60px #ff6b8a; }
  }
  #btn.hidden { opacity: 0; pointer-events: none; transition: opacity 0.8s; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="btn">I love you</button>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
const W = canvas.width;
const H = canvas.height;

const scale = Math.min(W, H) / 48;
const cx = W / 2;
const cy = H / 2 + scale;
const TOTAL = 120;

function getHeartPoints(n) {
  const pts = [];
  for (let i = 0; i < n; i++) {
    const t = (i / n) * 2 * Math.PI;
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
    pts.push({ x: cx + x * scale, y: cy + y * scale });
  }
  return pts;
}

const pts = getHeartPoints(TOTAL);
const texts = ['I love you','I love you','te amo','I love you','I love you','I love you'];
const pinks  = ['#ff2d55','#ff6b8a','#ffb3c6','#ff4d6d','#ffffff','#ff85a1'];

const pointData = pts.map((p, i) => ({
  x: p.x, y: p.y,
  text: texts[i % texts.length],
  color: pinks[Math.floor(Math.random() * pinks.length)],
  size: 7 + Math.random() * 6,
}));

const WAVE_WIDTH = 60;
const WAVE_SPEED = 25;
const WAVE_OFFSET = TOTAL / 2;
let wave1 = 0;

const nicolls = Array.from({ length: 10 }, () => ({
  x: Math.random() * W, y: Math.random() * H,
  vx: (Math.random() - 0.5) * 0.5,
  vy: (Math.random() - 0.5) * 0.5,
  alpha: Math.random(),
  alphaDir: Math.random() > 0.5 ? 1 : -1,
  alphaSpeed: 0.003 + Math.random() * 0.005,
  size: 13 + Math.random() * 16,
  color: pinks[Math.floor(Math.random() * pinks.length)],
}));

let burst = [];
let bursting = false;

function generatePositions() {
  const positions = [];
  const colW = 68;
  const rowH = 16;
  const cols = Math.ceil(W / colW) + 2;
  const rows = Math.ceil(H / rowH) + 2;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const offsetX = (r % 2 === 0) ? 0 : colW * 0.5;
      positions.push({
        x: c * colW + offsetX - colW + (Math.random() * 8 - 4),
        y: r * rowH + (Math.random() * 4 - 2),
        size: 11 + Math.random() * 5,
      });
    }
  }
  for (let i = positions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [positions[i], positions[j]] = [positions[j], positions[i]];
  }
  return positions;
}

document.getElementById('btn').addEventListener('click', function() {
  if (bursting) return;
  bursting = true;
  this.classList.add('hidden');

  const positions = generatePositions();
  let idx = 0;

  const interval = setInterval(() => {
    for (let k = 0; k < 12; k++) {
      if (idx >= positions.length) { clearInterval(interval); return; }
      const pos = positions[idx++];
      burst.push({
        x: pos.x, y: pos.y,
        alpha: 0,
        size: pos.size,
        color: pinks[Math.floor(Math.random() * pinks.length)],
        text: texts[Math.floor(Math.random() * texts.length)],
        fadeSpeed: 0.01 + Math.random() * 0.015,
        delayLeft: Math.random() * 0.4,
      });
    }
  }, 40);
});

function waveAlpha(waveHead, idx) {
  let dist = (waveHead - idx + TOTAL) % TOTAL;
  if (dist > WAVE_WIDTH) return 0;
  return Math.sin((dist / WAVE_WIDTH) * Math.PI);
}

let last = performance.now();

function loop(now) {
  const dt = (now - last) / 1000;
  last = now;
  ctx.clearRect(0, 0, W, H);

  wave1 = (wave1 + WAVE_SPEED * dt) % TOTAL;
  const wave2 = (wave1 + WAVE_OFFSET) % TOTAL;

  for (let i = 0; i < TOTAL; i++) {
    const pd = pointData[i];
    const alpha = Math.max(waveAlpha(wave1, i), waveAlpha(wave2, i));
    if (alpha <= 0) continue;
    const size = pd.size * (0.6 + 0.8 * alpha);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = `italic ${size}px Georgia, serif`;
    ctx.fillStyle = pd.color;
    ctx.shadowColor = pd.color;
    ctx.shadowBlur = 14 * alpha;
    ctx.fillText(pd.text, pd.x - 22, pd.y);
    ctx.restore();
  }

  for (const n of nicolls) {
    n.x += n.vx; n.y += n.vy;
    if (n.x < 0 || n.x > W) n.vx *= -1;
    if (n.y < 0 || n.y > H) n.vy *= -1;
    n.alpha += n.alphaDir * n.alphaSpeed;
    if (n.alpha >= 0.8)  { n.alpha = 0.8;  n.alphaDir = -1; }
    if (n.alpha <= 0.05) { n.alpha = 0.05; n.alphaDir =  1; }
    ctx.save();
    ctx.globalAlpha = n.alpha;
    ctx.font = `italic ${n.size}px Georgia, serif`;
    ctx.fillStyle = n.color;
    ctx.shadowColor = n.color;
    ctx.shadowBlur = 8;
    ctx.fillText('Nicoll', n.x, n.y);
    ctx.restore();
  }

  for (const b of burst) {
    if (b.delayLeft > 0) { b.delayLeft -= dt; continue; }
    if (b.alpha < 1) {
      b.alpha += b.fadeSpeed * 60 * dt;
      if (b.alpha > 1) b.alpha = 1;
    }
    ctx.save();
    ctx.globalAlpha = b.alpha;
    ctx.font = `italic ${b.size}px Georgia, serif`;
    ctx.fillStyle = b.color;
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 6;
    ctx.fillText(b.text, b.x, b.y);
    ctx.restore();
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
