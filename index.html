<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;

const W = canvas.width;
const H = canvas.height;

// Genera puntos del corazón en orden secuencial
function getHeartPoints(n, scale, cx, cy) {
  const pts = [];
  for (let i = 0; i < n; i++) {
    const t = (i / n) * 2 * Math.PI;
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
    pts.push({ x: cx + x * scale, y: cy + y * scale });
  }
  return pts;
}

// También puntos del interior en espiral para llenar
function getInnerPoints(n, scale, cx, cy) {
  const pts = [];
  // Varias "capas" internas del corazón
  for (let r = 0.85; r > 0.1; r -= 0.18) {
    const count = Math.floor(n * r);
    for (let i = 0; i < count; i++) {
      const t = (i / count) * 2 * Math.PI;
      const x = 16 * Math.pow(Math.sin(t), 3) * r;
      const y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t)) * r;
      pts.push({ x: cx + x * scale, y: cy + y * scale, layerR: r });
    }
  }
  return pts;
}

const scale = Math.min(W, H) / 52;
const cx = W / 2;
const cy = H / 2 + scale;

const borderPts = getHeartPoints(90, scale, cx, cy);
const innerPts  = getInnerPoints(70, scale, cx, cy);
const allPts    = [...borderPts, ...innerPts];

const TOTAL = allPts.length;

// La "ola" es una ventana de índices que están encendidos
// Cada punto tiene un índice; la ola avanza linealmente
const WAVE_WIDTH = 18;  // cuántos puntos están visibles a la vez
const WAVE_SPEED = 25;  // puntos por segundo que avanza la ola

const texts = ['I love you', 'I love you', 'I love you', 'te amo', 'I love you'];
const pinks  = ['#ff2d55','#ff6b8a','#ffb3c6','#ff4d6d','#fff0f3'];

// Asignar texto/color fijo a cada punto
const pointData = allPts.map((p, i) => ({
  x: p.x,
  y: p.y,
  text:  texts[i % texts.length],
  color: pinks[i  % pinks.length],
  size:  8 + Math.random() * 5,
}));

let waveHead = 0; // cabeza de la ola (índice float)
let last = performance.now();

function loop(now) {
  const dt = (now - last) / 1000;
  last = now;

  ctx.clearRect(0, 0, W, H);

  // Avanzar la ola
  waveHead = (waveHead + WAVE_SPEED * dt) % TOTAL;

  for (let i = 0; i < TOTAL; i++) {
    const pd = pointData[i];

    // Distancia circular de este punto a la cabeza de la ola
    let dist = waveHead - i;
    if (dist < 0) dist += TOTAL;

    // Solo los que están dentro de la ventana de la ola
    if (dist > WAVE_WIDTH) continue;

    // Alpha en forma de campana: máximo en el frente, desvanece hacia atrás
    const t = dist / WAVE_WIDTH;           // 0 = frente, 1 = cola
    const alpha = Math.sin(t * Math.PI);   // sube y baja suavemente

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = `italic ${pd.size}px Georgia, serif`;
    ctx.fillStyle = pd.color;
    ctx.shadowColor = pd.color;
    ctx.shadowBlur = 12 * alpha;
    ctx.fillText(pd.text, pd.x - 20, pd.y);
    ctx.restore();
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
