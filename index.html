<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
const W = canvas.width;
const H = canvas.height;

const scale = Math.min(W, H) / 48;
const cx = W / 2;
const cy = H / 2 + scale;

const TOTAL = 120;

function getHeartPoints(n) {
  const pts = [];
  for (let i = 0; i < n; i++) {
    const t = (i / n) * 2 * Math.PI;
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
    pts.push({ x: cx + x * scale, y: cy + y * scale });
  }
  return pts;
}

const pts = getHeartPoints(TOTAL);

const texts = ['I love you','I love you','I love you','te amo','I love you'];
const pinks  = ['#ff2d55','#ff6b8a','#ffb3c6','#ff4d6d','#ffffff'];

const pointData = pts.map((p, i) => ({
  x: p.x,
  y: p.y,
  text:  texts[i % texts.length],
  color: pinks[Math.floor(Math.random() * pinks.length)],
  size: 7 + Math.random() * 6,
}));

// Dos olas en la misma dirección, separadas por TOTAL/2
const WAVE_WIDTH = 40;  // ancho de cada ola en puntos
const WAVE_SPEED = 15;  // velocidad
const WAVE_OFFSET = TOTAL / 1.5; // separación entre ola 1 y ola 2

let wave1 = 0;
let last = performance.now();

// Nicolls flotando
const nicolls = Array.from({ length: 10 }, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  vx: (Math.random() - 0.5) * 0.5,
  vy: (Math.random() - 0.5) * 0.5,
  alpha: Math.random(),
  alphaDir: Math.random() > 0.5 ? 1 : -1,
  alphaSpeed: 0.003 + Math.random() * 0.005,
  size: 13 + Math.random() * 16,
  color: pinks[Math.floor(Math.random() * pinks.length)],
}));

function waveAlpha(waveHead, idx) {
  // Distancia circular desde idx hasta waveHead (cuánto "atrás" está idx de la cabeza)
  let dist = (waveHead - idx + TOTAL) % TOTAL;
  if (dist > WAVE_WIDTH) return 0;
  // Campana: sube al inicio, baja al final
  return Math.sin((dist / WAVE_WIDTH) * Math.PI);
}

function loop(now) {
  const dt = (now - last) / 1000;
  last = now;

  ctx.clearRect(0, 0, W, H);

  wave1 = (wave1 + WAVE_SPEED * dt) % TOTAL;
  const wave2 = (wave1 + WAVE_OFFSET) % TOTAL;

  for (let i = 0; i < TOTAL; i++) {
    const pd = pointData[i];

    const a1 = waveAlpha(wave1, i);
    const a2 = waveAlpha(wave2, i);
    const alpha = Math.max(a1, a2);

    if (alpha <= 0) continue;

    // Tamaño crece con alpha para dar sensación de profundidad
    const size = pd.size * (0.6 + 0.8 * alpha);

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = `italic ${size}px Georgia, serif`;
    ctx.fillStyle = pd.color;
    ctx.shadowColor = pd.color;
    ctx.shadowBlur = 14 * alpha;
    ctx.fillText(pd.text, pd.x - 22, pd.y);
    ctx.restore();
  }

  // Nicolls flotando
  for (const n of nicolls) {
    n.x += n.vx;
    n.y += n.vy;
    if (n.x < 0 || n.x > W) n.vx *= -1;
    if (n.y < 0 || n.y > H) n.vy *= -1;
    n.alpha += n.alphaDir * n.alphaSpeed;
    if (n.alpha >= 0.8) { n.alpha = 0.8; n.alphaDir = -1; }
    if (n.alpha <= 0.05) { n.alpha = 0.05; n.alphaDir = 1; }

    ctx.save();
    ctx.globalAlpha = n.alpha;
    ctx.font = `italic ${n.size}px Georgia, serif`;
    ctx.fillStyle = n.color;
    ctx.shadowColor = n.color;
    ctx.shadowBlur = 8;
    ctx.fillText('Nicoll', n.x, n.y);
    ctx.restore();
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
