<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: Georgia, serif;
  }
  canvas {
    position: fixed;
    top: 0; left: 0;
  }
  #btn {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: transparent;
    border: 2px solid #ff2d55;
    color: #ff2d55;
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 18px;
    padding: 12px 24px;
    border-radius: 30px;
    cursor: pointer;
    z-index: 10;
    text-shadow: 0 0 10px #ff2d55;
    box-shadow: 0 0 16px #ff2d5566;
    transition: all 0.2s;
  }
  #btn:hover {
    background: #ff2d5522;
    box-shadow: 0 0 28px #ff2d55aa;
  }
  #btn.hidden {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="btn">I love you</button>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
const W = canvas.width;
const H = canvas.height;

const scale = Math.min(W, H) / 48;
const cx = W / 2;
const cy = H / 2 + scale;
const TOTAL = 120;

function getHeartPoints(n) {
  const pts = [];
  for (let i = 0; i < n; i++) {
    const t = (i / n) * 2 * Math.PI;
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
    pts.push({ x: cx + x * scale, y: cy + y * scale });
  }
  return pts;
}

const pts = getHeartPoints(TOTAL);
const texts = ['I love you','I love you','I love you','te amo','I love you','I love you'];
const pinks  = ['#ff2d55','#ff6b8a','#ffb3c6','#ff4d6d','#ffffff','#ff85a1'];

const pointData = pts.map((p, i) => ({
  x: p.x, y: p.y,
  text:  texts[i % texts.length],
  color: pinks[Math.floor(Math.random() * pinks.length)],
  size:  7 + Math.random() * 6,
}));

const WAVE_WIDTH = 60;
const WAVE_SPEED = 25;
const WAVE_OFFSET = TOTAL / 2;
let wave1 = 0;

const nicolls = Array.from({ length: 10 }, () => ({
  x: Math.random() * W, y: Math.random() * H,
  vx: (Math.random() - 0.5) * 0.5,
  vy: (Math.random() - 0.5) * 0.5,
  alpha: Math.random(),
  alphaDir: Math.random() > 0.5 ? 1 : -1,
  alphaSpeed: 0.003 + Math.random() * 0.005,
  size: 13 + Math.random() * 16,
  color: pinks[Math.floor(Math.random() * pinks.length)],
}));

let burst = [];
let bursting = false;

// Pre-generar una cuadrícula densa de posiciones para cubrir toda la pantalla
function generateGridPositions() {
  const positions = [];
  const colW = 90;
  const rowH = 28;
  const cols = Math.ceil(W / colW) + 1;
  const rows = Math.ceil(H / rowH) + 1;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      positions.push({
        x: c * colW + (r % 2 === 0 ? 0 : colW / 2) + (Math.random() * 20 - 10),
        y: r * rowH + (Math.random() * 10 - 5),
      });
    }
  }
  // Mezclar aleatoriamente para que aparezcan en orden random
  for (let i = positions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [positions[i], positions[j]] = [positions[j], positions[i]];
  }
  return positions;
}

document.getElementById('btn').addEventListener('click', function() {
  if (bursting) return;
  bursting = true;
  this.classList.add('hidden');

  const positions = generateGridPositions();
  let idx = 0;

  const interval = setInterval(() => {
    // Spawnear varios a la vez para que llene rápido pero orgánicamente
    for (let k = 0; k < 6; k++) {
      if (idx >= positions.length) { clearInterval(interval); return; }
      const pos = positions[idx++];
      burst.push({
        x: pos.x,
        y: pos.y,
        alpha: 0,
        size: 9 + Math.random() * 14,
        color: pinks[Math.floor(Math.random() * pinks.length)],
        text: texts[Math.floor(Math.random() * texts.length)],
        fadeSpeed: 0.008 + Math.random() * 0.014,
        delayLeft: Math.random() * 0.3,
      });
    }
  }, 60);
});

function waveAlpha(waveHead, idx) {
  let dist = (waveHead - idx + TOTAL) % TOTAL;
  if (dist > WAVE_WIDTH) return 0;
  return Math.sin((dist / WAVE_WIDTH) * Math.PI);
}

let last = performance.now();

function loop(now) {
  const dt = (now - last) / 1000;
  last = now;

  ctx.clearRect(0, 0, W, H);

  // Olas del corazón
  wave1 = (wave1 + WAVE_SPEED * dt) % TOTAL;
  const wave2 = (wave1 + WAVE_OFFSET) % TOTAL;

  for (let i = 0; i < TOTAL; i++) {
    const pd = pointData[i];
    const alpha = Math.max(waveAlpha(wave1, i), waveAlpha(wave2, i));
    if (alpha <= 0) continue;
    const size = pd.size * (0.6 + 0.8 * alpha);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = `italic ${size}px Georgia, serif`;
    ctx.fillStyle = pd.color;
    ctx.shadowColor = pd.color;
    ctx.shadowBlur = 14 * alpha;
    ctx.fillText(pd.text, pd.x - 22, pd.y);
    ctx.restore();
  }

  // Nicolls flotando
  for (const n of nicolls) {
    n.x += n.vx; n.y += n.vy;
    if (n.x < 0 || n.x > W) n.vx *= -1;
    if (n.y < 0 || n.y > H) n.vy *= -1;
    n.alpha += n.alphaDir * n.alphaSpeed;
    if (n.alpha >= 0.8)  { n.alpha = 0.8;  n.alphaDir = -1; }
    if (n.alpha <= 0.05) { n.alpha = 0.05; n.alphaDir =  1; }
    ctx.save();
    ctx.globalAlpha = n.alpha;
    ctx.font = `italic ${n.size}px Georgia, serif`;
    ctx.fillStyle = n.color;
    ctx.shadowColor = n.color;
    ctx.shadowBlur = 8;
    ctx.fillText('Nicoll', n.x, n.y);
    ctx.restore();
  }

  // Explosión llenando pantalla
  for (const b of burst) {
    if (b.delayLeft > 0) { b.delayLeft -= dt; continue; }
    if (b.alpha < 0.92) {
      b.alpha += b.fadeSpeed * 60 * dt;
      if (b.alpha > 0.92) b.alpha = 0.92;
    }
    ctx.save();
    ctx.globalAlpha = b.alpha;
    ctx.font = `italic ${b.size}px Georgia, serif`;
    ctx.fillStyle = b.color;
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 8;
    ctx.fillText(b.text, b.x, b.y);
    ctx.restore();
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
