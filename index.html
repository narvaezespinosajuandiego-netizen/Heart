<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
const W = canvas.width;
const H = canvas.height;

const scale = Math.min(W, H) / 48;
const cx = W / 2;
const cy = H / 2 + scale;

function getHeartPoints(n) {
  const pts = [];
  for (let i = 0; i < n; i++) {
    const t = (i / n) * 2 * Math.PI;
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
    pts.push({ x: cx + x * scale, y: cy + y * scale });
  }
  return pts;
}

const TOTAL = 100;
const pts = getHeartPoints(TOTAL);

// Encontrar el índice de la punta superior (donde se unen los dos lóbulos)
// En la ecuación paramétrica, t=PI es la punta de abajo (más baja del corazón)
// t=0 / t=2PI es justo el centro-arriba donde se unen los lóbulos
// Buscamos el punto con Y más alta (valor más pequeño en canvas = más arriba)
// La punta del "valle" superior está cerca de t = PI/2 * ... busquemos el índice real
let topIdx = 0;
let topY = Infinity;
for (let i = 0; i < TOTAL; i++) {
  // La unión superior de los dos lóbulos es el punto más alto del centro
  // Es el punto con menor Y (más arriba) cerca del centro horizontal
  const p = pts[i];
  const distFromCenter = Math.abs(p.x - cx);
  if (distFromCenter < scale * 3 && p.y < topY) {
    topY = p.y;
    topIdx = i;
  }
}

const texts = ['I love you','I love you','I love you','te amo','I love you'];
const pinks  = ['#ff2d55','#ff6b8a','#ffb3c6','#ff4d6d','#ffffff'];

const pointData = pts.map((p, i) => ({
  x: p.x,
  y: p.y,
  text:  texts[i % texts.length],
  color: pinks[i % pinks.length],
  size:  8 + Math.random() * 5,
}));

// Dos olas que salen desde topIdx en direcciones opuestas
// Ola A: va desde topIdx hacia adelante (índices crecientes) → lado derecho bajando
// Ola B: va desde topIdx hacia atrás (índices decrecientes) → lado izquierdo bajando
// Ambas se encuentran en la punta inferior y vuelven

const WAVE_WIDTH = 42;   // cuántos puntos cubre cada ola
const WAVE_SPEED = 10;   // puntos por segundo

// Distancia circular entre dos índices (dirección positiva)
function distForward(from, to, total) {
  return (to - from + total) % total;
}

// El corazón tiene TOTAL puntos. topIdx es el punto fijo.
// La mitad del corazón = TOTAL/2 puntos.
// Ola A recorre: topIdx → topIdx + TOTAL/2 (pasando por la punta de abajo)
// Ola B recorre: topIdx → topIdx - TOTAL/2 (en dirección contraria, misma punta)
// Cuando una ola llega al extremo opuesto (topIdx + TOTAL/2), vuelve a topIdx

let waveA = 0; // offset desde topIdx en dirección +
let waveB = 0; // offset desde topIdx en dirección -
const HALF = TOTAL / 2;

// Nicolls flotando
const pinkColors = ['#ff2d55','#ff6b8a','#ffb3c6','#ff4d6d','#ffffff'];
const nicolls = Array.from({ length: 10 }, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  vx: (Math.random() - 0.5) * 0.6,
  vy: (Math.random() - 0.5) * 0.6,
  alpha: Math.random(),
  alphaDir: Math.random() > 0.5 ? 1 : -1,
  alphaSpeed: 0.003 + Math.random() * 0.005,
  size: 13 + Math.random() * 18,
  color: pinkColors[Math.floor(Math.random() * pinkColors.length)],
}));

let last = performance.now();

function getAlpha(waveHead, idx, direction, total) {
  // Distancia del punto idx a la cabeza de la ola, en la dirección dada
  let dist;
  if (direction > 0) {
    dist = distForward(topIdx, idx, total) - waveHead;
  } else {
    dist = distForward(idx, topIdx, total) - waveHead;
  }
  // dist negativo = ya pasó la ola, dist > WAVE_WIDTH = aún no llega
  if (dist < 0 || dist > WAVE_WIDTH) return 0;
  return Math.sin((dist / WAVE_WIDTH) * Math.PI);
}

function loop(now) {
  const dt = (now - last) / 1000;
  last = now;

  ctx.clearRect(0, 0, W, H);

  // Avanzar olas (se reinician al llegar a HALF)
  waveA = (waveA + WAVE_SPEED * dt) % HALF;
  waveB = (waveB + WAVE_SPEED * dt) % HALF;

  for (let i = 0; i < TOTAL; i++) {
    const pd = pointData[i];

    // Alpha de ola A (dirección positiva desde topIdx)
    const alphaA = getAlpha(waveA, i, 1, TOTAL);

    // Alpha de ola B (dirección negativa desde topIdx)
    const alphaB = getAlpha(waveB, i, -1, TOTAL);

    // El punto fijo (topIdx) siempre visible
    const isFixed = i === topIdx;

    const alpha = isFixed ? 0.9 : Math.max(alphaA, alphaB);
    if (alpha <= 0) continue;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = `italic ${pd.size}px Georgia, serif`;
    ctx.fillStyle = isFixed ? '#ffffff' : pd.color;
    ctx.shadowColor = isFixed ? '#ffffff' : pd.color;
    ctx.shadowBlur = 12 * alpha;
    ctx.fillText(pd.text, pd.x - 20, pd.y);
    ctx.restore();
  }

  // Nicolls flotando
  for (const n of nicolls) {
    n.x += n.vx;
    n.y += n.vy;
    if (n.x < 0 || n.x > W) n.vx *= -1;
    if (n.y < 0 || n.y > H) n.vy *= -1;
    n.alpha += n.alphaDir * n.alphaSpeed;
    if (n.alpha >= 0.85) { n.alpha = 0.85; n.alphaDir = -1; }
    if (n.alpha <= 0.08) { n.alpha = 0.08; n.alphaDir = 1; }

    ctx.save();
    ctx.globalAlpha = n.alpha;
    ctx.font = `italic ${n.size}px Georgia, serif`;
    ctx.fillStyle = n.color;
    ctx.shadowColor = n.color;
    ctx.shadowBlur = 8;
    ctx.fillText('Nicoll', n.x, n.y);
    ctx.restore();
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
